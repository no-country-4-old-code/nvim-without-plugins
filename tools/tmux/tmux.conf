# =============================================================================
# tmux configuration
# Theme: Tokyo Night Storm (#24283b background)
# NOTE: CTRL+Y conflicts with nvim's "scroll up one line" (CTRL+Y in normal
#       mode). Tmux captures the prefix first, so CTRL+Y won't reach nvim.
#       Consider CTRL+Space or CTRL+A if this becomes annoying.
# =============================================================================

# --- Prefix ------------------------------------------------------------------
unbind C-b
set -g prefix C-y
bind C-y send-prefix

# --- General -----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 10        # faster escape (important for nvim)
set -g focus-events on       # pass focus events to nvim
set -g mouse on
set -g history-limit 10000
set -g base-index 1          # windows start at 1
setw -g pane-base-index 1

# --- Tokyo Night Storm colors ------------------------------------------------
#   bg:           #24283b
#   bg_dark:      #1f2335
#   bg_highlight: #292e42
#   fg:           #c0caf5
#   blue:         #7aa2f7
#   cyan:         #7dcfff
#   green:        #9ece6a
#   yellow:       #e0af68
#   red:          #f7768e
#   comment:      #565f89

# --- Status bar --------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom

# Background / foreground of the whole bar
set -g status-style "bg=#1f2335,fg=#c0caf5"

# Left side: session name
set -g status-left-length 30
set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold] #S #[bg=#1f2335,fg=#7aa2f7]"

# Right side: empty
set -g status-right-length 0
set -g status-right ""

# Window list (centered)
set -g status-justify centre

# Inactive windows
setw -g window-status-format " #[fg=#565f89]#I #[fg=#c0caf5]#W "
setw -g window-status-style "bg=#1f2335"

# Active window
setw -g window-status-current-format " #[fg=#7aa2f7,bold]#I #[fg=#c0caf5,bold]#W "
setw -g window-status-current-style "bg=#292e42"

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# Message / command line
set -g message-style "bg=#292e42,fg=#e0af68"

# --- Keybindings (nvim-style) ------------------------------------------------
# New window / splits (inherit current path)
bind c new-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Close pane
bind q kill-pane
